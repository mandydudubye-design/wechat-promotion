services:
  - type: web
    name: wechat-promotion-backend
    env: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: wechat-promotion-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: wechat-promotion-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wechat-promotion-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: wechat-promotion-db
          property: database
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: wechat-promotion-db
    databaseName: wechat_promotion
    plan: free